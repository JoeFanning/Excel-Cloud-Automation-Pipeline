name: Weekly Excel Automation Pipeline

on:
  schedule:
    # Runs automatically every Friday at 17:00 UTC (5 PM)
    - cron: '0 17 * * 5'
  workflow_dispatch: # This adds the manual "Run Now" button on GitHub

jobs:
  run-automation:
    runs-on: ubuntu-latest # Fixed the previous typo!

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # This runs your calculation scripts, visuals, and mailer modules seamlessly
    - name: Execute Excel Engine and Send Email
      env:
        EMAIL_PASSWORD: ${{ secrets.SMTP_EMAIL_PASSWORD }}
      run: python main.py
